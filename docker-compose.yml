services:
  postgres:
    image: postgres:16-alpine
    container_name: suportif-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: suportif
      POSTGRES_PASSWORD: suportif
      POSTGRES_DB: suportif_dev
    ports:
      - "5432:5432"
    volumes:
      - suportif_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U suportif -d suportif_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  suportif_postgres_data:
